<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:url('bg.gif') center/cover fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,30,.7);
  pointer-events:none; /* 🔥 FIX */
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,.7);
  position:relative;
  z-index:2;
}

.menu-icon{
  cursor:pointer;
  font-size:25px;
}

.mobile-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:250px;
  height:100%;
  background:black;
  padding:20px;
  transition:.4s;
  z-index:3;
}

.mobile-menu a{
  display:block;
  margin:15px 0;
  color:white;
}

.active{ right:0 }

h1{
  text-shadow:0 0 15px violet;
  position:relative;
  z-index:2;
}

.card{
  margin:40px auto;
  width:80%;
  padding:30px;
  background:rgba(0,0,0,.6);
  border-radius:12px;
  box-shadow:0 0 20px violet;
  cursor:pointer;
  transition:.3s;
  position:relative;
  z-index:2;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px violet;
}

</style>
</head>

<body>

<div class="navbar">
  <div>🏆 Knight SMP</div>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="mobile-menu" id="menu">
  <a href="index.html">Home</a>
  <a href="store.html">Store</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="rules.html">Rules</a>
</div>

<h1>🏆 Leaderboards</h1>

<div class="card" onclick="window.location.href='lifesteal.html'">
  🩸 Lifesteal Leaderboard
</div>

<div class="card" onclick="window.location.href='duels.html'">
  ⚔️ Duels Leaderboard
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
