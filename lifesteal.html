<!DOCTYPE html>
<html>
<head>
<title>Lifesteal Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:url('bg.gif') center/cover fixed;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(10,0,30,.7);
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,.7);
}

.menu-icon{
  font-size:25px;
  cursor:pointer;
}

.mobile-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:250px;
  height:100%;
  background:black;
  padding:20px;
  transition:.4s;
}

.mobile-menu a{
  display:block;
  margin:15px 0;
  color:white;
}

.active{ right:0 }

h1{text-align:center;text-shadow:0 0 15px violet;}

.box{
  margin:30px auto;
  width:90%;
  background:rgba(0,0,0,.6);
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px violet;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🩸 Knight SMP</div>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="mobile-menu" id="menu">
  <a href="index.html">Home</a>
  <a href="store.html">Store</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="rules.html">Rules</a>
</div>

<h1>🩸 Lifesteal Stats</h1>

<div class="box">
<p>Most Money: -</p>
<p>Most Hearts: -</p>
<p>Most Deaths: -</p>
<p>Achievements: -</p>
<p>Most Kills: -</p>
<p>Playtime: -</p>
<p>Coins: -</p>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
