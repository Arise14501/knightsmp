<!DOCTYPE html>
<html>
<head>
<title>Lifesteal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png">

<style>
body{margin:0;font-family:Arial;color:white;text-align:center;background:url('bg.gif') center/cover fixed;}
body::before{content:"";position:fixed;inset:0;background:rgba(10,0,20,.7);pointer-events:none;}
.content{position:relative;z-index:1;}

.navbar{display:flex;justify-content:space-between;padding:12px 20px;background:black;}
.logo{height:40px;}

.menu-icon{cursor:pointer;font-size:26px;}

.mobile-menu{
display:none;
position:absolute;
right:10px;
top:60px;
background:black;
padding:10px;
border-radius:10px;
flex-direction:column;
}

.mobile-menu a{margin:5px 0;color:white;}

.box{
margin:40px auto;
width:80%;
padding:20px;
background:rgba(0,0,0,.6);
border-radius:10px;
}
</style>
</head>

<body>
<div class="content">

<div class="navbar">
<img src="logo.png" class="logo">
<div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="mobile-menu" id="menu">
<a href="leaderboard.html">⬅ Back</a>
</div>

<h1>🩸 Lifesteal</h1>

<div class="box">
<p>Most Money: -</p>
<p>Most Hearts: -</p>
<p>Most Deaths: -</p>
<p>Achievements: -</p>
<p>Most Kills: -</p>
<p>Playtime: -</p>
<p>Coins: -</p>
</div>

</div>

<script>
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=(m.style.display==="flex")?"none":"flex";
}
</script>

</body>
</html>
